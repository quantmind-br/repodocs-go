name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Run tests with coverage
        run: |
          set -euo pipefail
          go test -short ./... -coverprofile=coverage.out -covermode=atomic

      - name: Generate coverage reports per package
        run: |
          # Create output directory
          mkdir -p coverage-reports

          # Define packages and their coverage thresholds
          declare -A thresholds=(
            ["internal/strategies"]=34
            ["internal/converter"]=75
            ["internal/app"]=48
            ["internal/llm"]=70
            ["internal/config"]=54
            ["internal/output"]=80
            ["internal/cache"]=75
            ["internal/fetcher"]=70
            ["internal/git"]=80
            ["cmd/repodocs"]=48
            ["internal/domain"]=85
            ["internal/renderer"]=28
          )

          # Track overall status
          all_passed=true
          module_path=$(go list -m)
          summary_file=coverage-reports/summary.txt
          : > "$summary_file"

          # Check each package
          for pkg in "${!thresholds[@]}"; do
            threshold=${thresholds[$pkg]}

            pkg_profile=$(mktemp)
            awk -v prefix="${module_path}/${pkg}/" 'NR == 1 || index($0, prefix) == 1 { print }' coverage.out > "$pkg_profile"
            coverage=$(go tool cover -func="$pkg_profile" 2>/dev/null | awk '/^total:/ {print $3}' | sed 's/%//')
            rm -f "$pkg_profile"

            if [ -n "$coverage" ]; then
              # Convert to integer for comparison
              coverage_int=${coverage%.*}

              # Check if meets threshold
              if [ "$coverage_int" -lt "$threshold" ]; then
                echo "❌ FAIL: $pkg - Coverage: ${coverage}% (required: ${threshold}%)"
                all_passed=false
              else
                echo "✅ PASS: $pkg - Coverage: ${coverage}% (required: ${threshold}%)"
              fi

              # Save to summary file
              echo "$pkg: ${coverage}%" >> "$summary_file"
            else
              echo "⚠️  WARN: $pkg - No coverage data available"
              echo "$pkg: N/A" >> "$summary_file"
            fi
          done

          # Generate HTML report
          go tool cover -html=coverage.out -o coverage-reports/coverage.html

          # Display summary
          echo ""
          echo "=== Coverage Summary ==="
          cat coverage-reports/summary.txt

          # Fail if any package is below threshold
          if [ "$all_passed" = false ]; then
            echo ""
            echo "❌ Coverage threshold failed for one or more packages"
            exit 1
          fi

          echo ""
          echo "✅ All packages meet coverage requirements"

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            coverage-reports/
            coverage.out

  test-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Run tests
        run: go test -short ./...

  comment-pr:
    runs-on: ubuntu-latest
    needs: [test, test-windows]
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Download coverage reports
        uses: actions/download-artifact@v4
        with:
          name: coverage-reports
          path: coverage-reports

      - name: Comment PR with coverage
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('coverage-reports/summary.txt', 'utf8');

            const comment = `## 📊 Coverage Report\n\n${summary.split('\n').map(line => {
              const [pkg, cov] = line.split(': ');
              if (!pkg || !cov) return line;
              const emoji = cov === 'N/A' ? '⚠️' : (cov === 'ERROR' ? '❌' : '✅');
              return `${emoji} **${pkg}**: ${cov}`;
            }).join('\n')}\n\n📝 Full report available in workflow artifacts`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
